<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
        }

        .navbar{
            position:fixed;
            top:0;
            left:0;
            display:flex;
            justify-content: space-between;
            align-items:center;
            width:100%;
            background: rgba(15, 23, 42, 0.95);
            padding:20px 50px;
            transition: all 0.3s ease;
            z-index:1000;
        }

        .navbar.scrolled {
            background: rgba(15, 23, 42, 0.95);
            padding: 1rem 5%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
        }

        #logo{
            font-size: 30px;
            font-weight:700;
            color:white;
        }

        #logo:hover{
            transform: scale(1.10);
        }

        .links{
            display:flex;
            list-style:none;
            gap:0.5rem;
        }

        .links a{
            position:relative;
            text-decoration:none;
            color: rgba(255, 255, 255, 0.85);
            padding: 0.7rem 1.3rem;
            font-weight:500;
            font-size:1rem;
            overflow: hidden;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .links a::before{
            content: '';
            position: absolute;
            top:0;
            left:0;
            width: 100%;
            height:100%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            opacity:0;
            transform: scale(0.8);
            border-radius: 8px;
            transition: all 0.3s ease;
            z-index: -1;
        }

        .links a:hover {
            color: #fff;
            transform: translateY(-2px);
        }

        .links a:hover::before{
            opacity:1;
            transform:scale(1);
        }

        .links a::after{
            content:'';
            position:absolute;
            bottom: 6px;
            left:50%;
            width:0;
            height:2px;
            background: #fff;
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .links a:hover::after{
            width:60%;
        }

        .menu-toggle{
            display:none;
            flex-direction:column;
            gap:5px;
            cursor:pointer;
            padding:10px;
            z-index:1100;
        }

        .menu-toggle span{
            width:25px;
            height:3px;
            background:#fff;
            border-radius: 3px;
            transition:all 0.3s ease;
        }

        /* CROSS ANIMATION */

        .menu-toggle.active span:nth-child(1){
            transform: rotate(45deg) translate(5px, 5px);
        }

        .menu-toggle.active span:nth-child(2){
            opacity:0;
        }

        .menu-toggle.active span:nth-child(3){
            transform: rotate(-45deg) translate(6px, -6px);
        }

        .home{
            height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color:#fff;
            text-align:center;
        }

        .home h1{
            font-size: 3rem;
            margin-bottom:1rem;
        }

        .home p{
            font-size:1.2rem;
            opacity:0.75;
        }

        section{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding: 5rem 10%;
        }

        section h2{
            font-size: 2.7rem;
            color: #0f172a;
            text-align: center;
        }

        section p{
            font-size:1.2rem;
            color: #64748b;
            line-height: 1.8;
        }

        .about{
            background: #f8fafc;
        }

        .section{
            background: #fff;
        }

        .contact{
            background: #f8fafc;
        }

        @media(max-width:768px){

            .menu-toggle{
                display:flex;
            }

            .links{
                position:fixed;
                top:0%;
                right:-100%;
                width:70%;
                height:100vh;
                flex-direction:column;
                background:#0f172a;
                padding:5rem 2rem;
                gap:1rem;
                transition:right 0.4s ease;
            }

            .links.active{
                right:0;
            }

            .links a{
                display:block;
                width:100%;
                padding:12px 16px;
                font-size:1rem;
            }

            /* MOBILE UNDERLINE FIX */

            .links a::after{
                left:16px;
                transform:none;
                bottom:8px;
                width:0;
            }

            .links a:hover::after{
                width:35px;
            }

        }

    </style>
</head>

<body>

    <nav class="navbar" id="navbar">
        <p id="logo">Brand.</p>
        <ul class="links" id="links">
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>

        <div class="menu-toggle" id="menuToggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <section class="home" id="home">
        <div>
            <h1>Interactive navigation menu</h1>
            <p>Scroll down</p>
        </div>
    </section>

    <section class="about" id="about">
        <div>
            <h2>About Us</h2>
            <p>
                This responsive design also includes a mobile-friendly 
                hamburger menu that slides in from the right on smaller screens.
            </p>
        </div>

    </section>
    <section class="section" id="services">
        <div>
            <h2>Our services</h2>
        </div>

    </section>
    <section class="contact" id="contact">
        <div>
            <h2>Contact Us</h2>
        </div>
    </section>

    <script>
        const navbar = document.getElementById('navbar');
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('links');
        const sections = document.querySelectorAll('section');
        /* MOBILE TOGGLE */
        menuToggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            menuToggle.classList.toggle('active');
        });
    </script>
</body>
</html>
